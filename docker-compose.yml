services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_backend_dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Maps your entire 'atin' folder into the container workspace
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENV=development
      # Mandatory Pydantic Metadata Configs
      - APP_NAME=InventoryManagementBackend
      - APP_VERSION=1.0.0
      # Relational Tier Networking Parameters (Matches postgres_db service)
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=inventory_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
      # Document Tier Networking Parameters (Matches mongo_db service)
      - MONGO_URI=mongodb://admin:supersecret@mongo_db:27017/
      - MONGO_DB=inventory_mongo
      # Cache Tier Networking Parameters (Matches redis_cache service)
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
      # Security Token Layer Parameters
      - JWT_SECRET_KEY=dev_secret_key_dont_use_this_in_production_12345
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      # LEFT SIDE: Creates a 'data/postgres' folder inside your 'atin' directory
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo_db:
    image: mongo:7.0
    container_name: mongo_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: supersecret
    ports:
      - "27017:27017"
    volumes:
      # LEFT SIDE: Creates a 'data/mongo' folder inside your 'atin' directory
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7.2-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      # LEFT SIDE: Creates a 'data/redis' folder inside your 'atin' directory
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
