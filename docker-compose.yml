services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_backend_dev
    restart: unless-stopped
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8000}:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=${DOCKER_POSTGRES_HOST:-postgres_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - MONGO_URI=${DOCKER_MONGO_URI:-mongodb://mongo_db:27017/}
      - REDIS_HOST=${DOCKER_REDIS_HOST:-redis_cache}
      - REDIS_PORT=${DOCKER_REDIS_PORT:-6379}
    depends_on:
      postgres_db:
        condition: service_healthy
      mongo_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo_db:
    image: mongo:7.0
    container_name: mongo_db
    restart: unless-stopped
    ports:
      - "${MONGO_EXTERNAL_PORT:-27017}:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7.2-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5