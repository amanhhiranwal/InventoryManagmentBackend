apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads-pvc
  namespace: synergy-crm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synergy-backend
  namespace: synergy-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synergy-backend
  template:
    metadata:
      labels:
        app: synergy-backend
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: backend
          image: synergy-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST
              value: postgres-db
            - name: POSTGRES_PORT
              value: 5432
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: synergy-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: synergy-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: synergy-secrets
                  key: postgres-db
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: synergy-secrets
                  key: mongo-uri
            - name: REDIS_HOST
              value: redis-cache
            - name: REDIS_PORT
              value: 6379
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: backend-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: synergy-backend
  namespace: synergy-crm
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: synergy-backend
